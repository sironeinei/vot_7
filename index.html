<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>１着当てクイズ投票</title><script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body{font-family:sans-serif;text-align:center;padding:10px} button{padding:12px;font-size:18px;width:90%;margin:5px auto;border-radius:8px;font-weight:bold;border:none}
.btn-1{background:#fff;color:#000;border:1px solid #000}.btn-2{background:#000;color:#fff}.btn-3{background:#e74c3c;color:#fff}.btn-4{background:#3498db;color:#fff}.btn-5{background:#f1c40f;color:#000}.btn-6{background:#2ecc71;color:#fff}.btn-7{background:#e67e22;color:#fff}.btn-8{background:#ff9ff3;color:#000}.btn-9{background:#9b59b6;color:#fff}
.hidden{display:none} input{padding:10px;font-size:16px;width:80%} #qr-canvas{margin:10px auto;width:200px;height:200px}
</style></head><body>
<div id="scr-form">
  <h2>ニックネームを入力して投票！</h2>
  <input type="text" id="uname" placeholder="ニックネーム"><br><br>
  <button style="background:#333;color:#fff" onclick="goVote()">次へ</button>
  <div id="v-status" style="margin-top:20px;color:red;font-weight:bold"></div>
  <canvas id="qr-canvas" class="hidden"></canvas>
</div>
<div id="scr-btns" class="hidden"></div>
<script>
const V_END = new Date("");
const E_END = new Date("");
const PLAYERS = [];
let uuid = localStorage.getItem("uid") || 'xxyx'.replace(/[xy]/g, c => (Math.random()*16|0).toString(16));
localStorage.setItem("uid", uuid);

function goVote() {
  const n = document.getElementById('uname').value.trim();
  if(!n) return alert("名前を入力！");
  if(new Date() > V_END) return alert("投票は終了しました");
  localStorage.setItem("uname", n);
  document.getElementById('scr-form').classList.add('hidden');
  const b = document.getElementById('scr-btns');
  b.classList.remove('hidden'); b.innerHTML = '<h2>誰に投票する？</h2>';
  PLAYERS.forEach(p => {
    b.innerHTML += `<button class="${p.c}" onclick="vote(${p.n})">${p.n}: ${p.t}</button><br>`;
  });
}
function vote(n) {
  if(new Date() > V_END) return location.reload();
  const d = {n: n, name: localStorage.getItem("uname"), t: new Date().toISOString()};
  localStorage.setItem("vData", JSON.stringify(d));
  location.reload();
}
window.onload = () => {
  const vd = JSON.parse(localStorage.getItem("vData"));
  const now = new Date();
  if(vd) {
    document.getElementById('uname').style.display = 'none';
    document.querySelector('#scr-form button').textContent = "投票を変更する";
    if(now > E_END) {
       document.getElementById('v-status').innerHTML = "景品交換期間は終了しました。";
    } else if(now > V_END) {
       document.getElementById('v-status').innerHTML = "投票終了。結果をお待ちください。<br>的中時はQRを提示して下さい。";
       document.querySelector('#scr-form button').classList.add('hidden');
    } else {
       document.getElementById('v-status').innerHTML = "投票済み: " + vd.n + "番";
    }
    const q = document.getElementById('qr-canvas');
    if(now <= E_END) {
      q.classList.remove('hidden');
      const dStr = new Date(vd.t).toISOString().replace(/\D/g,'').slice(2,12);
      QRCode.toCanvas(q, `${uuid}-${vd.name}-${vd.n}-${dStr}`);
    }
  } else if(now > V_END) {
    document.getElementById('scr-form').innerHTML = "<h2>投票は終了しました</h2>";
  }
};
</script></body></html>
