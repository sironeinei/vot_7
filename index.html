<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>１着当てクイズ</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
    .hidden { display: none !important; }
    button { margin: 8px auto; padding: 12px; font-size: 18px; width: 90%; border: none; font-weight: bold; border-radius: 8px; }
    input { font-size: 16px; padding: 8px; width: 90%; }
    h2 { margin-top: 20px; font-size: 20px; }
    .btn-1 { background-color: #ffffff; color: #000; border: 2px solid #333 !important; }
    .btn-2 { background-color: #000000; color: #fff; }
    .btn-3 { background-color: #e74c3c; color: #fff; }
    .btn-4 { background-color: #3498db; color: #fff; }
    .btn-5 { background-color: #f1c40f; color: #000; }
    .btn-6 { background-color: #2ecc71; color: #fff; }
    .btn-7 { background-color: #e67e22; color: #fff; }
    .btn-8 { background-color: #ff9ff3; color: #000; }
    .btn-9 { background-color: #9b59b6; color: #fff; }
    .btn-black-text { color: #000 !important; }
    #last-vote { margin-top: 10px; font-size: 14px; color: #333; line-height: 1.4; }
    #uuid-display { margin-top: 5px; font-size: 10px; color: #666; }
    #qr-wrapper { position: relative; width: 200px; height: 200px; margin: 10px auto; }
    #qr-canvas { width: 100% !important; height: 100% !important; }
    #qr-expired-overlay { width: 100%; height: 100%; border: 4px solid #c0392b; border-radius: 8px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; color: #c0392b; font-size: 24px; font-weight: bold; box-sizing: border-box; line-height: 1.4; }
    .big-number-container { width: 80px; height: 80px; margin: 10px auto 5px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 60px; line-height: 1; border: 1px solid #ccc; }
    #countdown { font-size: 14px; font-weight: bold; color: #333; margin-bottom: 10px; }
    #exchange-msg { margin-top: 15px; font-size: 16px; font-weight: bold; }
    .msg-active { color: #d35400; }
    .msg-expired { color: #c0392b; }
  </style>
</head>
<body>
<div id="screen-name">
  <h2 id="name-label">ニックネームを入力してね！</h2>
  <input id="username" placeholder="ニックネームを入力" required>
  <p id="deadline-text" style="margin: 5px 0; font-size: 14px; color: #444"></p>
  <button id="vote-btn" class="btn-black-text" onclick="handleName()">投票に進む</button>
  <div id="last-vote" class="hidden"></div>
  <div id="exchange-msg"></div>
  <div id="qr-wrapper" class="hidden">
    <canvas id="qr-canvas"></canvas>
    <div id="qr-expired-overlay" class="hidden"><span>交換期間<br>終了</span></div>
  </div>
  <div id="uuid-display"></div>
</div>
<div id="screen-vote" class="hidden">
  <h2>１着でゴールするのは！？</h2>
  <p id="countdown"></p>
  <div id="vote-buttons"></div>
</div>

<script>
const VOTE_END = new Date("2026-07-24T19:10");
const EXCHANGE_END = new Date("2026-07-24T19:15");
const players = [{"n":1,"t":"中井俊(なかい)","c":"btn-1"},{"n":2,"t":"吉田(よしだ)","c":"btn-2"},{"n":3,"t":"栗山(くりやま)","c":"btn-3"},{"n":4,"t":"佐藤(さとう)","c":"btn-4"},{"n":5,"t":"元砂勇(もとすな)","c":"btn-5"},{"n":6,"t":"伊狩(いかり)","c":"btn-6"},{"n":7,"t":"大井(おおい)","c":"btn-7"}];

function $(id) { return document.getElementById(id); }

function localStorageAvailable() {
  try { const t = "__t__"; localStorage.setItem(t, t); localStorage.removeItem(t); return true; } catch(e) { return false; }
}
function generateUUIDv4() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0; return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

let uuid = "";
let storageOK = localStorageAvailable();
if (!storageOK) {
  $("name-label").innerHTML = "投票データが保存できません。<br>通常モードでご利用ください。";
  $("username").style.display = "none"; $("vote-btn").style.display = "none";
} else {
  uuid = localStorage.getItem("uuid") || generateUUIDv4();
  localStorage.setItem("uuid", uuid);
  const savedName = localStorage.getItem("username");
  if (savedName) $("username").value = savedName;
}

function handleName() {
  const name = $("username").value.trim();
  if (!name) return alert("名前を入力してください");
  if (new Date() > VOTE_END) return;
  localStorage.setItem("username", name);
  showVoteScreen(name);
}

function showVoteScreen(name) {
  $("screen-name").classList.add("hidden");
  $("screen-vote").classList.remove("hidden");
  let c = $("vote-buttons"); c.innerHTML = "";
  players.forEach(p => {
    let b = document.createElement("button");
    b.textContent = p.n + "：" + p.t;
    b.className = p.c;
    b.onclick = () => {
      if (new Date() > VOTE_END) return returnToNameScreen(true);
      const voteData = { name: name, number: p.n, time: new Date().toISOString() };
      localStorage.setItem("voteData", JSON.stringify(voteData));
      returnToNameScreen();
    };
    c.appendChild(b);
  });
  showCountdown();
}

function returnToNameScreen(ended) {
  $("screen-vote").classList.add("hidden");
  $("screen-name").classList.remove("hidden");
  if (ended) {
    $("name-label").innerHTML = "投票は終了しました！<br>ご投票ありがとうございます♪";
    $("username").style.display = "none"; $("vote-btn").style.display = "none";
  }
  showLastVote();
}

function formatCompactTime(iso) {
  const d = new Date(iso);
  return String(d.getFullYear()).slice(2) + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') + String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0');
}

function showLastVote() {
  const d = JSON.parse(localStorage.getItem("voteData"));
  if (!d) return;
  
  const now = new Date();
  const p = players.find(x => x.n === d.number);
  const cls = p?.c || "";
  const col = (d.number === 1 || d.number === 5 || d.number === 8) ? "black" : "white";

  const num = `<div class="big-number-container ${cls}" style="color:${col}">${d.number}</div>`;
  const time = "投票時刻 " + new Date(d.time).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });

  $("last-vote").innerHTML = `${d.name}さんの予想：<br>${num}${p?.t || ""}<br>${time}`;
  $("last-vote").classList.remove("hidden");

  const msgEl = $("exchange-msg"), qrWrapper = $("qr-wrapper"), qrCanvas = $("qr-canvas"), qrOverlay = $("qr-expired-overlay"), uuidEl = $("uuid-display");
  qrWrapper.classList.remove("hidden");
  uuidEl.textContent = "投票ID: " + uuid;

  const exchangeTimeStr = EXCHANGE_END.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", hour12: false });

  if (now > EXCHANGE_END) {
    msgEl.innerHTML = `【引換受付終了】<br>景品の引き換え期間は終了しました。`;
    msgEl.className = "msg-expired";
    qrCanvas.classList.add("hidden"); qrOverlay.classList.remove("hidden");
  } else {
    qrCanvas.classList.remove("hidden"); qrOverlay.classList.add("hidden");
    if (now > VOTE_END) {
      $("name-label").innerHTML = "投票は終了しました！<br>結果発表をお待ちください♪";
      $("username").style.display = "none"; $("vote-btn").style.display = "none";
      msgEl.innerHTML = `的中した方は、<br>このQRコードをスタッフに提示してください。<br>（交換期限：${exchangeTimeStr} まで）`;
      msgEl.className = "msg-active";
    } else {
      $("name-label").innerHTML = "投票済みです。<br>変更する場合は投票を変更ボタンを押してください。";
      $("vote-btn").textContent = "投票を変更"; msgEl.innerHTML = "";
    }
    const safeName = d.name.replace(/[^a-zA-Z0-9\u3040-\u30FF\u4E00-\u9FFF]/g, '');
    const qrText = `${uuid}-${safeName}-${d.number}-${formatCompactTime(d.time)}`;
    QRCode.toCanvas(qrCanvas, qrText, { errorCorrectionLevel: 'L', width: 200 });
  }
}

function showCountdown() {
  const el = $("countdown");
  const update = () => {
    let diff = Math.max(0, Math.floor((VOTE_END - new Date()) / 1000));
    el.textContent = `締切まで ${String(Math.floor(diff/60)).padStart(2,'0')}分${String(diff%60).padStart(2,'0')}秒`;
  };
  update();
  let timer = setInterval(() => { update(); if (new Date() > VOTE_END) clearInterval(timer); }, 1000);
}

function setupAutoReload(tDate) {
  let delay = tDate - new Date();
  if (delay > 0 && delay <= 86400000) setTimeout(() => location.reload(), delay);
}

window.onload = () => {
  if (!storageOK) return;
  const ended = new Date() > VOTE_END;
  $("deadline-text").textContent = "※投票締切時刻 " + VOTE_END.toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit", hour12: false });
  if (ended) {
    $("name-label").innerHTML = "投票は終了しました！<br>ご投票ありがとうございます♪";
    $("username").style.display = "none"; $("vote-btn").style.display = "none";
  }
  showLastVote();
  setupAutoReload(VOTE_END); setupAutoReload(EXCHANGE_END);
};
</script></body></html>
